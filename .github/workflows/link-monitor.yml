name: Link Monitor

on:
  workflow_dispatch: # Allows manual triggering
  repository_dispatch: # Webhook triggering from FastCron
    types: [monitor-trigger]

jobs:
  monitor-links:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Log trigger source
      run: |
        echo "🚀 NapStopper monitoring started at $(date)"
        echo "Trigger: ${{ github.event_name }}"
        
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run link monitor
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
      run: node monitor-links.js
      
    - name: Log completion
      if: success()
      run: echo "✅ NapStopper monitoring completed successfully at $(date)"
      
    - name: Log failure
      if: failure()
      run: echo "❌ NapStopper monitoring failed at $(date)"
